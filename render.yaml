services:
  # Web service — Django API
  - type: web
    name: weekend-events-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash startup.sh
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: weekend-events-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: weekend-events-redis
          type: redis
          property: connectionString
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_PUBLIC_KEY
        sync: false
      - key: FLUTTERWAVE_SECRET_HASH
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: FROM_NAME
        value: Weekend Events
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  # Celery worker — async QR + email tasks
  - type: worker
    name: weekend-events-worker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config worker --loglevel=info --concurrency=2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: SECRET_KEY
        fromService:
          name: weekend-events-api
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: weekend-events-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: weekend-events-redis
          type: redis
          property: connectionString
      - key: SENDGRID_API_KEY
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: FROM_NAME
        value: Weekend Events

databases:
  - name: weekend-events-db
    plan: free
    databaseName: weekend_events
    user: weekend_events_user

  - name: weekend-events-redis
    plan: free
    ipAllowList: []
